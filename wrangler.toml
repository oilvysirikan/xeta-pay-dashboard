name = "payment-dashboard"
compatibility_date = "2024-04-01"

# Pages configuration
pages_build_output_dir = "out"

# Environment variables
[vars]
ENVIRONMENT = "production"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "sv9-platform-db"
database_id = "1897e56c-9a75-4bc7-823c-d61256f955b6"

# KV namespace for cache
[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-id"

# Service bindings
[[services]]
binding = "ROUTER"
service = "sv9-router"
environment = "production"
